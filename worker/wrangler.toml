name = "shift-scheduler-api"
main = "src/index.js"
compatibility_date = "2026-03-30"

[[kv_namespaces]]
binding = "SHIFT_DATA"
id = "718cef89874e4d98805146c078df025f"

[vars]
ALLOWED_ORIGIN = "https://ymatz28-beep.github.io"

# Cron Triggers (UTC)
# 23:30 UTC Sun-Thu = 08:30 JST Mon-Fri (morning)
# 08:00 UTC Mon-Fri = 17:00 JST Mon-Fri (evening)
[triggers]
crons = ["30 23 * * SUN-THU", "0 8 * * MON-FRI"]
